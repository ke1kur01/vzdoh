<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вздох — Шаршевич Ярослав</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
--bg: #0a0908;
--bg2: #0d0c0a;
--bg3: #111009;
--paper: #f0ece4;
--muted: rgba(240,236,228,0.45);
--accent: #c8b89a;
--line: rgba(240,236,228,0.1);
}

html { scroll-behavior: smooth; }

body {
background: var(--bg);
color: var(--paper);
font-family: 'Jost', sans-serif;
font-weight: 300;
overflow-x: hidden;
}

/* HERO (оставлен как есть) */
.hero { min-height: 100vh; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.hero-bg { position: absolute; inset: 0; background-image: url('cover.jpg'); background-size: cover; background-position: center 20%; filter: brightness(0.13) saturate(0.5); transform: scale(1.05); animation: slowZoom 20s ease-out forwards; }
.hero-smoke { position: absolute; inset: 0; background-image: url('smoke.jpg'); background-size: cover; background-position: center top; opacity: 0.07; mix-blend-mode: screen; animation: driftUp 24s ease-in-out infinite alternate; }
.hero-vignette { position: absolute; inset: 0; background: radial-gradient(ellipse at center, rgba(10,9,8,0.2) 0%, rgba(10,9,8,0.95) 100%); }
.hero-content { position: relative; z-index: 2; text-align: center; padding: 40px 24px; display: flex; flex-direction: column; align-items: center; }

.hero-title {
font-family: 'Cormorant Garamond', serif;
font-size: clamp(96px, 18vw, 200px);
font-weight: 300;
}

/* PARTS (ВОЗВРАЩЕНО) */
.parts-section {
background: var(--bg2);
padding: 120px 80px;
}

.parts-grid {
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 2px;
}

.part-card {
background: rgba(240,236,228,0.03);
border: 1px solid var(--line);
padding: 40px 28px;
transition: all 0.3s ease;
}

.part-card:hover {
background: rgba(200,184,154,0.1);
transform: translateY(-4px);
}

/* ABOUT (исправленный, но остальное не тронуто) */
.about-section {
background: var(--bg);
padding: 120px 80px;
display: grid;
grid-template-columns: 1.6fr 1fr;
gap: 100px;
align-items: center;
border-top: 1px solid var(--line);
position: relative;
overflow: hidden;
}

.about-section::before {
content: '';
position: absolute;
inset: 0;
background: url('smoke.jpg') center/cover;
opacity: 0.035;
mix-blend-mode: screen;
pointer-events: none;
}

.about-heading {
color: rgba(240,236,228,0.95);
}

.about-body {
color: rgba(240,236,228,0.82);
}

@keyframes slowZoom {
from { transform: scale(1.05); }
to { transform: scale(1); }
}
@keyframes driftUp {
from { transform: translateY(0); }
to { transform: translateY(-40px); }
}
</style>
</head>

<body>

<section class="hero">
<div class="hero-bg"></div>
<div class="hero-smoke"></div>
<div class="hero-vignette"></div>

<div class="hero-content">
<h1 class="hero-title">Вздох</h1>
</div>
</section>

<section class="parts-section">
<div class="parts-grid">
<div class="part-card">Рана</div>
<div class="part-card">Диагноз</div>
<div class="part-card">Лекарство</div>
<div class="part-card">Прохлада</div>
</div>
</section>

<section class="about-section">
<div>
<h2 class="about-heading">Чувства, которые невозможно прожить наполовину</h2>
<div class="about-body">
<p>От боли до восстановления.</p>
</div>
</div>
</section>

</body>
</html>
